async function decrypt(pw){
  const enc=new TextEncoder();
  const km=await crypto.subtle.importKey("raw",enc.encode(pw),{name:"PBKDF2"},false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey(
    {name:"PBKDF2",salt:b64(P.salt),iterations:P.iter,hash:"SHA-256"},
    km,{name:"AES-GCM",length:256},false,["decrypt"]);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(P.iv)},key,b64(P.ct));
  return new TextDecoder().decode(pt);
}
async function go(){
  const pw=document.getElementById("pw").value;
  const err=document.getElementById("err");

  try{
    const html=await decrypt(pw);
    document.open();document.write(html);document.close();
  }catch(e){

  }
}
